services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: QtriveFrontend
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: apps/http-server/Dockerfile
    container_name: QtriveBackend
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/Qtrive
    env_file:
      - ./apps/http-server/.env
    command: sh -c "pnpm prisma generate && pnpm prisma migrate deploy && pnpm run dev"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: Qtrive_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: Qtrive
    volumes:
      - Qtrive_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg-isready -U postgres -d Qtrive -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  Qtrive_data: